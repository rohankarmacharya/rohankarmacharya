<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', 'Courier New', Consolas, monospace">
  <defs>
    <clipPath id="typeClip">
      <rect x="50" y="230" width="0" height="28">
        <animate attributeName="width" values="0;616;616;0" keyTimes="0;0.4;0.85;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window body -->
  <rect x="1" y="1" width="898" height="298" rx="16" fill="#0f0c29" stroke="#302b63" stroke-width="2"/>

  <!-- title bar -->
  <rect x="1" y="1" width="898" height="42" rx="16" fill="#1a1735"/>
  <rect x="1" y="27" width="898" height="16" fill="#1a1735"/>

  <!-- traffic lights -->
  <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>

  <!-- title -->
  <text x="450" y="27" text-anchor="middle" font-size="13" fill="#8b8fa3">rohan@github: ~</text>

  <!-- body lines -->
  <text x="24" y="90" font-size="18">
    <tspan fill="#8F9DFF">$ </tspan><tspan fill="#e6e6e6">whoami</tspan>
  </text>
  <text x="24" y="124" font-size="18" fill="#7ee787">  rohan-karmacharya</text>

  <text x="24" y="168" font-size="18">
    <tspan fill="#8F9DFF">$ </tspan><tspan fill="#e6e6e6">cat role.txt</tspan>
  </text>
  <text x="24" y="202" font-size="18" fill="#7ee787">  BSc. CSIT Graduate · Junior Backend Developer · Full Stack Enthusiast</text>

  <text x="24" y="246" font-size="18">
    <tspan fill="#8F9DFF">$ </tspan><tspan fill="#e6e6e6">echo "building things worth shipping"</tspan>
  </text>

  <!-- typewriter reveal line -->
  <text x="24" y="278" font-size="18">
    <tspan fill="#8F9DFF">$ </tspan>
  </text>
  <g clip-path="url(#typeClip)">
    <text x="50" y="278" font-size="18" fill="#e6e6e6">Building scalable systems, one line of code at a time.</text>
  </g>

  <!-- blinking, moving cursor synced to the typewriter -->
  <rect y="260" width="10" height="22" fill="#8F9DFF">
    <animate attributeName="x" values="50;666;666;50" keyTimes="0;0.4;0.85;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
