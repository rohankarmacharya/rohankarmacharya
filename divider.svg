<svg width="100%" height="6" viewBox="0 0 1600 6" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#8F9DFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8F9DFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8F9DFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="1600" height="6" rx="3"/>
    </clipPath>
  </defs>
  <rect width="1600" height="6" rx="3" fill="url(#base)"/>
  <g clip-path="url(#clip)">
    <rect x="-400" y="0" width="400" height="6" fill="url(#shimmer)">
      <animate attributeName="x" from="-400" to="1600" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
