<svg width="520" height="195" viewBox="0 0 520 195" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', Consolas, Monaco, monospace">
  <defs>
    <clipPath id="cardClip"><rect x="0" y="0" width="520" height="195" rx="10"/></clipPath>
    <clipPath id="clip1"><rect x="30" y="41" width="0" height="20"><animate attributeName="width" keyTimes="0;0;0.067;0.967;1" values="0;0;92;92;0" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip2"><rect x="30" y="69" width="0" height="20"><animate attributeName="width" keyTimes="0;0.10;0.256;0.967;1" values="0;0;281;281;0" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip3"><rect x="30" y="97" width="0" height="20"><animate attributeName="width" keyTimes="0;0.289;0.467;0.967;1" values="0;0;275;275;0" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip4"><rect x="30" y="125" width="0" height="20"><animate attributeName="width" keyTimes="0;0.5;0.644;0.967;1" values="0;0;260;260;0" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip5"><rect x="30" y="153" width="0" height="20"><animate attributeName="width" keyTimes="0;0.678;0.856;0.967;1" values="0;0;382;382;0" dur="9s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- Card body -->
  <g clip-path="url(#cardClip)">
    <rect width="520" height="195" fill="#0f0c29"/>
    <rect width="520" height="28" fill="#1a1640"/>
  </g>
  <rect x="0.75" y="0.75" width="518.5" height="193.5" rx="9.25" fill="none" stroke="#302b63" stroke-width="1.5"/>

  <!-- Traffic light dots -->
  <circle cx="20" cy="14" r="5" fill="#ff5f56"/>
  <circle cx="38" cy="14" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="14" r="5" fill="#27c93f"/>
  <text x="260" y="18" font-size="11" fill="#6b6b8f" text-anchor="middle">bash</text>

  <!-- Line 1: $ whoami -->
  <g clip-path="url(#clip1)">
    <text y="55" font-size="15">
      <tspan x="30" fill="#8F9DFF">$ </tspan><tspan fill="#f5f5ff">whoami</tspan>
    </text>
  </g>

  <!-- Line 2: name -->
  <g clip-path="url(#clip2)">
    <text y="83" font-size="15">
      <tspan x="30" fill="#8F9DFF">name     : </tspan><tspan fill="#f5f5ff">Rohan Karmacharya</tspan>
    </text>
  </g>

  <!-- Line 3: role -->
  <g clip-path="url(#clip3)">
    <text y="111" font-size="15">
      <tspan x="30" fill="#8F9DFF">role     : </tspan><tspan fill="#f5f5ff">Backend Developer</tspan>
    </text>
  </g>

  <!-- Line 4: based_in -->
  <g clip-path="url(#clip4)">
    <text y="139" font-size="15">
      <tspan x="30" fill="#8F9DFF">based_in : </tspan><tspan fill="#f5f5ff">Lalitpur, Nepal</tspan>
    </text>
  </g>

  <!-- Line 5: debug_style -->
  <g clip-path="url(#clip5)">
    <text y="167" font-size="15">
      <tspan x="30" fill="#8F9DFF">debug_style: </tspan><tspan fill="#f5f5ff">stare until guilt kicks in</tspan>
    </text>
  </g>

  <!-- Blinking cursor that hops to the end of each line as it's typed -->
  <rect width="8" height="16" fill="#8F9DFF">
    <animate attributeName="x" calcMode="discrete" keyTimes="0;0.067;0.256;0.467;0.644;0.856;0.967;1" values="30;122;311;305;293;412;412;30" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="y" calcMode="discrete" keyTimes="0;0.067;0.256;0.467;0.644;0.856;0.967;1" values="43;43;71;99;127;155;155;43" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
